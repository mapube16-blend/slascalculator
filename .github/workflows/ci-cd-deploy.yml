name: CI/CD Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zammad-sla-reporter-backend:latest
            ghcr.io/${{ github.repository_owner }}/zammad-sla-reporter-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zammad-sla-reporter-frontend:latest
            ghcr.io/${{ github.repository_owner }}/zammad-sla-reporter-frontend:${{ github.sha }}

  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y ssh

      - name: Create deploy script
        run: |
          cat > remote-deploy.sh <<'EOF'
          #!/bin/bash
          set -e
          # On remote server: navigate to app directory and pull new images, then restart
          cd $DEPLOY_PATH || exit 1
          docker compose pull
          docker compose up -d --remove-orphans
          EOF
          chmod +x remote-deploy.sh

      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            export DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            cd $DEPLOY_PATH || exit 1
            docker compose pull
            docker compose up -d --remove-orphans

# Secrets required in repository settings:
# - DEPLOY_HOST: IP or hostname of the production server
# - DEPLOY_USER: SSH user (must have permission to run docker compose)
# - DEPLOY_SSH_KEY: Private SSH key content
# - DEPLOY_PORT: SSH port (default 22)
# - DEPLOY_PATH: Path on remote server where repository/docker-compose.yml exists
