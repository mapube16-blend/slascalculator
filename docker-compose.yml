services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zammad-sla-reporter
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3000
      TIMEZONE: ${TIMEZONE:-America/Bogota}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-sla-data}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_GLUE_CRAWLER_NAME: ${AWS_GLUE_CRAWLER_NAME}
    # volumes:          # Solo para desarrollo local (hot-reload). En producción
    #   - ./backend:/app  # comentar estos volúmenes para usar los archivos del image.
    #   - /app/node_modules
    restart: unless-stopped
    networks:
      - sla-network

networks:
  sla-network:
    driver: bridge
